# Conda environment specification for the MSc thesis:
# "Explainable Machine Learning Framework for Building-Level Cooling Demand
#  Projection under Climate Change Scenarios: The Case of Milan"
#
# Author: Nima Mohammadi
# Institution: Politecnico di Torino
#
# Package versions are aligned with Table 3.8 of the thesis Methodology chapter.
#
# Create the environment with:
#     conda env create -f environment.yml
# Activate it with:
#     conda activate ml-cooling-demand-milan

name: ml-cooling-demand-milan

channels:
  - conda-forge
  - defaults

dependencies:
  # Python interpreter
  - python=3.11

  # Core scientific computing
  - numpy=1.26
  - pandas=2.1
  - scipy=1.11

  # Machine learning
  - scikit-learn=1.4
  - xgboost=2.0
  - lightgbm=4.1
  - catboost=1.2

  # Geospatial data handling
  - geopandas=0.14
  - shapely=2.0
  - pyproj=3.6
  - rasterio=1.3

  # Climate data handling
  - xarray>=2023.10
  - netCDF4>=1.6

  # Visualisation
  - matplotlib=3.8
  - seaborn=0.13
  - folium=0.15

  # Utilities
  - joblib>=1.3
  - tqdm>=4.66
  - openpyxl>=3.1

  # Jupyter notebook support
  - jupyter>=1.0
  - ipykernel>=6.25

  # Pip and packages best installed via pip
  - pip
  - pip:
      # Explainable AI
      - shap>=0.44
      - lime>=0.2.0.1

      # Sensitivity analysis (Sobol-Saltelli)
      - SALib>=1.4

      # Bayesian hyperparameter optimisation
      - scikit-optimize>=0.9

      # Climate data APIs
      - cdsapi>=0.7
      - earthengine-api>=0.1.380

      # Document generation
      - python-docx>=1.0
